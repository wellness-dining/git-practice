name: Deploy to GitHub Pages

# main または staging ブランチへのpush時に自動実行
on:
  push:
    branches: [main, staging]
  workflow_dispatch:

# GitHub Pages に必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を制御（複数のpushが重なっても最新だけデプロイ）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------- ビルドジョブ ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-content

      - name: Checkout staging branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: staging
          path: staging-content

      - name: Combine main and staging into _site
        run: |
          mkdir -p _site
          if [ -d "main-content" ]; then
            shopt -s dotglob
            cp -r main-content/* _site/ 2>/dev/null || true
            rm -rf _site/.github _site/.git 2>/dev/null || true
          fi
          if [ -d "staging-content" ]; then
            mkdir -p _site/staging
            shopt -s dotglob
            cp -r staging-content/* _site/staging/ 2>/dev/null || true
            rm -rf _site/staging/.github _site/staging/.git 2>/dev/null || true
          fi
          echo "=== Generated structure ==="
          ls -la _site/
          echo "=== Staging folder ==="
          ls -la _site/staging/ 2>/dev/null || echo "(staging branch not yet created)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ---------- デプロイジョブ ----------
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ---------- Teams 通知 ----------
      - name: Notify Teams
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # ブランチと成否でタイトル・色を切り替え
          if [ "$JOB_STATUS" = "failure" ]; then
            STYLE="attention"
            HEAD="❌ デプロイ失敗：${BRANCH} ブランチ"
            NEXT_ACTION="Actionsタブでエラー内容を確認してください"
          elif [ "$BRANCH" = "staging" ]; then
            STYLE="warning"
            HEAD="🟡 検証環境が更新されました"
            NEXT_ACTION="責任者の方：検証サイトを確認 → 問題なければ main へPR作成"
          elif [ "$BRANCH" = "main" ]; then
            STYLE="good"
            HEAD="✅ 本番環境が更新されました"
            NEXT_ACTION="本番サイトで変更内容を確認してください"
          else
            STYLE="default"
            HEAD="ℹ️ デプロイ完了：${BRANCH} ブランチ"
            NEXT_ACTION="サイトで変更内容を確認してください"
          fi

          # サイトURL
          if [ "$BRANCH" = "staging" ]; then
            SITE_URL="https://wellness-dining.github.io/git-practice/staging/"
            SITE_LABEL="🌐 検証サイトを確認"
          else
            SITE_URL="https://wellness-dining.github.io/git-practice/"
            SITE_LABEL="🌐 本番サイトを確認"
          fi
          RUN_URL="${SERVER}/${REPO}/actions/runs/${RUN_ID}"
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)

          # jq で安全にJSONを組み立て
          PAYLOAD=$(jq -n \
            --arg head "$HEAD" \
            --arg style "$STYLE" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg next_action "$NEXT_ACTION" \
            --arg site_url "$SITE_URL" \
            --arg site_label "$SITE_LABEL" \
            --arg run_url "$RUN_URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    {
                      type: "Container",
                      style: $style,
                      bleed: true,
                      items: [{
                        type: "TextBlock",
                        text: $head,
                        weight: "bolder",
                        size: "large",
                        wrap: true
                      }]
                    },
                    {
                      type: "FactSet",
                      facts: [
                        { title: "リポジトリ", value: $repo },
                        { title: "ブランチ", value: $branch },
                        { title: "変更者", value: $actor },
                        { title: "コミット", value: $sha }
                      ]
                    },
                    {
                      type: "TextBlock",
                      text: ("**変更内容：** " + $commit_msg),
                      wrap: true,
                      spacing: "medium"
                    },
                    {
                      type: "TextBlock",
                      text: ("▶ " + $next_action),
                      wrap: true,
                      color: "accent",
                      weight: "bolder",
                      spacing: "medium"
                    }
                  ],
                  actions: [
                    {
                      type: "Action.OpenUrl",
                      title: $site_label,
                      url: $site_url
                    },
                    {
                      type: "Action.OpenUrl",
                      title: "⚙ GitHub Actionsで詳細",
                      url: $run_url
                    }
                  ]
                }
              }]
            }')

          # Teams へ送信
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"
          echo ""
          echo "Teams notification sent."
